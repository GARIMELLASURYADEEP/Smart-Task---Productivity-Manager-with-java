<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Smart Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function () {
            var theme = localStorage.getItem('smarttask-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>

    <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="logo"><i class="bi bi-check2-square"></i> SmartTask</div>
            <nav>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-grid"></i> Dashboard</a>
                <a href="tasks.html" class="nav-link"><i class="bi bi-list-task"></i> Tasks</a>
                <a href="analytics.html" class="nav-link"><i class="bi bi-bar-chart"></i> Analytics</a>
            </nav>
            <button class="theme-toggle-btn" type="button" title="Switch theme">
                <i class="bi bi-sun-fill"></i>
                <span class="theme-label">Day Mode</span>
            </button>
            <button class="logout-btn" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </aside>

        <main class="main-content">
            <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1>My Tasks</h1>
                    <p>Add, edit, delete and complete your daily tasks</p>
                </div>
                <button class="btn btn-primary-custom" style="width: auto; padding: 10px 20px;" data-bs-toggle="modal" data-bs-target="#taskModal" onclick="openAddModal()">
                    <i class="bi bi-plus-lg"></i> Add Task
                </button>
            </div>

            <!-- Search & Filter Bar -->
            <div class="filter-bar">
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="searchInput" placeholder="Search tasks...">
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="filterPriority">
                            <option value="all">All Priority</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="filterStatus">
                            <option value="all">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="filterDueDate">
                            <option value="all">All Dates</option>
                            <option value="today">Due Today</option>
                            <option value="overdue">Overdue</option>
                            <option value="upcoming">Upcoming</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary-custom w-100" id="applyFilterBtn">Apply Filter</button>
                    </div>
                </div>
            </div>

            <div id="alertBox" class="alert-custom"></div>
            <div id="tasksList"></div>
        </main>
    </div>

    <!-- Add/Edit Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="taskForm">
                        <input type="hidden" id="taskId">
                        <div class="mb-3">
                            <label class="form-label">Title *</label>
                            <input type="text" class="form-control" id="taskTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="taskDescription" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Priority</label>
                            <select class="form-select" id="taskPriority">
                                <option value="High">High</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="Low">Low</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Due Date</label>
                            <input type="date" class="form-control" id="taskDueDate">
                        </div>
                        <div class="mb-3" id="statusField" style="display:none;">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="taskStatus">
                                <option value="pending">Pending</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary-custom" style="width:auto;" id="saveTaskBtn">Save Task</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/tasks.js"></script>
</body>
</html>
