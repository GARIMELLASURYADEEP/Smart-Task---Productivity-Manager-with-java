<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function () {
            var theme = localStorage.getItem('smarttask-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>

    <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="logo"><i class="bi bi-check2-square"></i> SmartTask</div>
            <nav>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-grid"></i> Dashboard</a>
                <a href="tasks.html" class="nav-link"><i class="bi bi-list-task"></i> Tasks</a>
                <a href="analytics.html" class="nav-link"><i class="bi bi-bar-chart"></i> Analytics</a>
            </nav>
            <button class="theme-toggle-btn" type="button" title="Switch theme">
                <i class="bi bi-sun-fill"></i>
                <span class="theme-label">Day Mode</span>
            </button>
            <button class="logout-btn" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </aside>

        <!-- Main Dashboard Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Dashboard</h1>
                <p>Welcome back, <span id="usernameDisplay">User</span>! Here's your productivity overview.</p>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card total">
                    <div class="label">Total Tasks</div>
                    <div class="value" id="totalTasks">0</div>
                </div>
                <div class="stat-card completed">
                    <div class="label">Completed</div>
                    <div class="value" id="completedTasks">0</div>
                </div>
                <div class="stat-card pending">
                    <div class="label">Pending</div>
                    <div class="value" id="pendingTasks">0</div>
                </div>
                <div class="stat-card overdue">
                    <div class="label">Overdue</div>
                    <div class="value" id="overdueTasks">0</div>
                </div>
            </div>

            <!-- Productivity Progress -->
            <div class="progress-section">
                <h5>Productivity Score</h5>
                <p class="text-muted mb-0">Completion rate based on your tasks</p>
                <div class="d-flex justify-content-between mt-2">
                    <span id="productivityText">0%</span>
                    <span class="text-muted" id="productivityLabel">Keep going!</span>
                </div>
                <div class="progress-bar-custom">
                    <div class="progress-fill" id="productivityBar" style="width: 0%"></div>
                </div>
            </div>

            <!-- Recent Tasks -->
            <div class="chart-card">
                <h5><i class="bi bi-clock-history"></i> Recent Tasks</h5>
                <div id="recentTasksList">
                    <p class="text-muted">Loading tasks...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
