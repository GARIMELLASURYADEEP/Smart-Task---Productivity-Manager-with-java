<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Smart Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function () {
            var theme = localStorage.getItem('smarttask-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>

    <button class="menu-toggle" id="menuToggle"><i class="bi bi-list"></i></button>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="logo"><i class="bi bi-check2-square"></i> SmartTask</div>
            <nav>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-grid"></i> Dashboard</a>
                <a href="tasks.html" class="nav-link"><i class="bi bi-list-task"></i> Tasks</a>
                <a href="analytics.html" class="nav-link"><i class="bi bi-bar-chart"></i> Analytics</a>
            </nav>
            <button class="theme-toggle-btn" type="button" title="Switch theme">
                <i class="bi bi-sun-fill"></i>
                <span class="theme-label">Day Mode</span>
            </button>
            <button class="logout-btn" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Productivity Analytics</h1>
                <p>Visual insights into your task performance</p>
            </div>

            <div class="row">
                <!-- Priority Pie Chart -->
                <div class="col-lg-4 col-md-6">
                    <div class="chart-card">
                        <h5>Tasks by Priority</h5>
                        <canvas id="priorityChart"></canvas>
                    </div>
                </div>

                <!-- Status Doughnut Chart -->
                <div class="col-lg-4 col-md-6">
                    <div class="chart-card">
                        <h5>Task Completion Status</h5>
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>

                <!-- Weekly Productivity Line Chart -->
                <div class="col-lg-4 col-md-12">
                    <div class="chart-card">
                        <h5>Weekly Productivity</h5>
                        <canvas id="weeklyChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/analytics.js"></script>
</body>
</html>
