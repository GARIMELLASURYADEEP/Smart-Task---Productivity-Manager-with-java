<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function () {
            var theme = localStorage.getItem('smarttask-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body class="auth-page">

    <div class="auth-theme-toggle">
        <button class="theme-toggle-btn" type="button" title="Switch theme">
            <i class="bi bi-sun-fill"></i>
            <span class="theme-label">Day Mode</span>
        </button>
    </div>

    <div class="auth-card">
        <div class="brand">
            <i class="bi bi-check2-square"></i> Smart Task Manager
        </div>
        <h2>Welcome back</h2>
        <p class="subtitle">Login to manage your tasks and productivity</p>

        <div id="alertBox" class="alert-custom"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary-custom mt-2">Login</button>
        </form>

        <p class="text-center mt-4" style="color: var(--text-muted);">
            New user?
            <a href="signup.html" class="auth-link">Create account</a>
        </p>

        <div class="demo-box">
            <strong>Demo Account:</strong><br>
            Username: <code>demo</code> | Password: <code>demo123</code>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
